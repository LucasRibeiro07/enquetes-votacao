{% extends 'base.html' %}

{% block content %}
<form action="{% url 'enquetes:voto' questao.id %}" method="post">
  {% csrf_token %}
  <fieldset>
    <legend><h1>{{ questao.texto_questao }}</h1></legend>
    
    {% if error_message %}
      <p><strong>{{ error_message }}</strong></p>
    {% endif %}

    {% for alternativa in questao.alternativa_set.all %}
      <input type="radio" name="alternativa" id="alt{{ forloop.counter }}" value="{{ alternativa.id }}">
      <label for="alt{{ forloop.counter }}">{{ alternativa.texto_alternativa }}</label><br>
    {% endfor %}
  </fieldset>
  <br>
  <input type="submit" value="Votar" class="btn btn-primary">
</form>
{% endblock %}
